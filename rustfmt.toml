# rustfmt 1.9.x (stable) — https://rust-lang.github.io/rustfmt/?version=v1.9.0
edition = "2024"
max_width = 80
newline_style = "Unix"
tab_spaces = 4

# Prefer vertical layout over squeezing code onto long lines.
use_small_heuristics = "Off"
fn_params_layout = "Vertical"
fn_call_width = 40
chain_width = 40
array_width = 40
attr_fn_like_width = 50
struct_lit_width = 0
struct_variant_width = 0
single_line_if_else_max_width = 0
single_line_let_else_max_width = 0

# Imports and modules
reorder_imports = true
reorder_modules = true

# Idiomatic Rust
use_field_init_shorthand = true
use_try_shorthand = true
remove_nested_parens = true

# Match arms
match_block_trailing_comma = true
match_arm_leading_pipes = "Always"

# Derives and ABI
merge_derives = true
force_explicit_abi = true
