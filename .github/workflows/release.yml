name: Release

on:
  push:
    tags:
      - "V*.*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p stream-dl --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/stream-dl" dist/
          cp "target/${{ matrix.target }}/release/prefetch-tools" dist/
          chmod +x dist/stream-dl dist/prefetch-tools
          tar -czf "stream-dl-${{ matrix.target }}.tar.gz" -C dist stream-dl prefetch-tools

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/stream-dl.exe" dist/
          Copy-Item "target/${{ matrix.target }}/release/prefetch-tools.exe" dist/
          Compress-Archive -Path dist/* -DestinationPath "stream-dl-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: stream-dl-${{ matrix.target }}
          path: stream-dl-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
